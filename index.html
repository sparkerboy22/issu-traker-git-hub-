<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitHub Issues Tracker</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ==================== LOGIN PAGE ==================== -->
<div id="login-page">
  <div class="login-box">
    <div class="login-header">
      <div class="gh-logo-wrap">
        <img src="./assets/github-logo.png" alt="GitHub Logo"/>
      </div>
      <h1>GitHub Issues Tracker</h1>
      <p>Track and manage your project issues</p>
    </div>

    <div class="error-msg" id="err-box">Incorrect username or password.</div>

    <div class="form-field">
      <label for="inp-user">Username</label>
      <input type="text" id="inp-user" placeholder="Enter Username"/>
    </div>

    <div class="form-field">
      <label for="inp-pass">Password</label>
      <input type="password" id="inp-pass" placeholder="Enter Password"/>
    </div>

    <button class="btn-sign-in" onclick="doLogin()">Sign In</button>

    <div class="demo-creds">
      <div class="demo-title">Demo Credentials</div>
      <p>Username: <span class="val">admin</span></p>
      <p>Password: <span class="val">admin123</span></p>
    </div>
  </div>
</div>

<!-- ==================== MAIN PAGE ==================== -->
<div id="main-page">

  <!-- Navbar — white background -->
  <nav class="navbar">
    <div class="nav-left">
      <img class="nav-logo-img" src="./assets/github-logo.png" alt="GitHub Logo"/>
      <span class="nav-title">GitHub Issues Tracker</span>
    </div>
    <div class="nav-right">
      <div class="nav-search-wrap">
        <svg class="srch-icon" width="14" height="14" viewBox="0 0 16 16">
          <path d="M10.68 11.74a6 6 0 0 1-7.922-8.982 6 6 0 0 1 8.982 7.922l3.04 3.04a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215ZM11.5 7a4.499 4.499 0 1 0-8.997 0A4.499 4.499 0 0 0 11.5 7Z"/>
        </svg>
        <input class="nav-search" type="text" id="search-box" placeholder="Search issues..." oninput="onSearch(this.value)"/>
      </div>
      <button class="btn-new-issue">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
          <path d="M7.75 2a.75.75 0 0 1 .75.75V7h4.25a.75.75 0 0 1 0 1.5H8.5v4.25a.75.75 0 0 1-1.5 0V8.5H2.75a.75.75 0 0 1 0-1.5H7V2.75A.75.75 0 0 1 7.75 2Z"/>
        </svg>
        New Issue
      </button>
      <button class="btn-logout" onclick="doLogout()">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
          <path d="M2 2.75C2 1.784 2.784 1 3.75 1h5a.75.75 0 0 1 0 1.5h-5a.25.25 0 0 0-.25.25v10.5c0 .138.112.25.25.25h5a.75.75 0 0 1 0 1.5h-5A1.75 1.75 0 0 1 2 13.25Zm10.44 4.5-1.97-1.97a.749.749 0 0 1 .326-1.275.749.749 0 0 1 .734.215l3.25 3.25a.75.75 0 0 1 0 1.06l-3.25 3.25a.749.749 0 0 1-1.275-.326.749.749 0 0 1 .215-.734l1.97-1.97H6.75a.75.75 0 0 1 0-1.5Z"/>
        </svg>
        Sign Out
      </button>
    </div>
  </nav>

  <!-- Content -->
  <div class="content">

    <!-- Tabs -->
    <div class="tabs-row">
      <button class="tab-btn active" id="tab-all"    onclick="switchTab('all')">All</button>
      <button class="tab-btn"        id="tab-open"   onclick="switchTab('open')">Open</button>
      <button class="tab-btn"        id="tab-closed" onclick="switchTab('closed')">Closed</button>
    </div>

    <!-- Meta bar -->
    <div class="issues-meta">
      <div class="issues-left">
        <!-- Aperture.png used here beside issues count -->
        <img src="./assets/Aperture.png" alt="Issues icon" class="meta-icon"/>
        <span id="count-text"><strong>0</strong> issues — Track and manage your project issues</span>
      </div>
      <div class="legend">
        <div class="legend-item">
          <img src="./assets/Open-Status.png" alt="Open" class="legend-icon"/>
          Open
        </div>
        <div class="legend-item">
          <img src="./assets/Closed-Status.png" alt="Closed" class="legend-icon"/>
          Closed
        </div>
      </div>
    </div>

    <!-- Issues Grid -->
    <div class="issues-grid" id="grid">
      <div class="spinner-wrap"><div class="spinner"></div></div>
    </div>

  </div>
</div>

<!-- ==================== MODAL ==================== -->
<div class="modal-overlay" id="modal-overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-top-bar" id="modal-top"></div>
    <div class="modal-inner">
      <div class="modal-head">
        <div class="modal-head-left">
          <div class="icon-wrap" id="m-icon"></div>
          <div class="modal-title" id="m-title"></div>
        </div>
        <button class="modal-x" onclick="closeModal()">&#10005;</button>
      </div>
      <div class="modal-desc" id="m-desc"></div>
      <div class="modal-grid">
        <div class="mfield">
          <div class="mlabel">Status</div>
          <div id="m-status"></div>
        </div>
        <div class="mfield">
          <div class="mlabel">Priority</div>
          <div id="m-priority" class="priority-tag"></div>
        </div>
        <div class="mfield">
          <div class="mlabel">Author</div>
          <div class="mvalue" id="m-author"></div>
        </div>
        <div class="mfield">
          <div class="mlabel">Label</div>
          <div id="m-label" class="label-tag"></div>
        </div>
        <div class="mfield">
          <div class="mlabel">Created At</div>
          <div class="mvalue" id="m-date"></div>
        </div>
        <div class="mfield">
          <div class="mlabel">Issue #</div>
          <div class="mvalue" id="m-id"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
